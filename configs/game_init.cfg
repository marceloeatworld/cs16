// ==========================================================
// game_init.cfg — executed ONCE at game DLL init (before server.cfg)
// ==========================================================
// Any cvar that freezes at boot must live here, not in server.cfg.
// ReGameDLL reads this from cstrike/game_init.cfg via GameDLLInit().
//
// CRITICAL: bot_enable is gated behind this file on dedicated HLDS.
// Without it, bot_add / bot_quota silently do nothing.
bot_enable 1
