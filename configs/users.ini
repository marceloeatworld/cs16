; AMX Mod X admin list.
;
; Format: "identifier" "password" "access_flags" "auth_flags"
;
; Access flags ("abcdefghijklmnopqrstu" = full admin):
;   a immunity        l rcon / full cvars
;   b reserved slot   m/n/o/p/q/r/s/t  custom levels A-H
;   c kick            u menu access (amx_menu)
;   d ban/unban       z simple user
;   e slay/slap       f map    g cvar    h cfg
;   i admin chat      j vote   k sv_password access
;
; Auth flags:
;   a name (steam or non-steam)
;   c nickname + password (client sets "setinfo _pw password")
;   d IP
;   e SteamID
;
; Examples:
;   "STEAM_0:1:12345678" "" "abcdefghijklmnopqrstu" "ce"
;   "YourNick"            "YourPassword" "abcdefghijklmnopqrstu" "c"
;   "192.168.1.42"        "" "abcdefghijklmnopqrstu" "d"
;
; Use ./admin-setup.sh for the interactive setup.
; Add one line per admin below.
