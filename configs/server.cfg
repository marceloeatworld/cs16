// ==========================================================
// CS 1.6 server - FUN mode
// Everyone is here to have fun: max money, auto gear, open access.
// ==========================================================

hostname "[AITEKLABS] CS 1.6 Fun Arena | Packs | Bots | /rtv"
sv_contact ""

// --- Gameplay (FUN) ---
mp_friendlyfire 0           // no team kill
mp_autoteambalance 1
mp_limitteams 2
mp_roundtime 5              // 5 min rounds, take your time
mp_freezetime 1             // 1s freeze, no waiting
mp_startmoney 16000         // start with max money (plugin refills every spawn)
mp_maxrounds 0              // unlimited rounds
mp_winlimit 0               // no win limit
mp_timelimit 60             // refresh map/game state every hour
mp_c4timer 45               // more time to defuse
mp_buytime 9999             // effectively unlimited buytime
mp_buy_anywhere 1           // ReGameDLL: buy from anywhere on the map
mp_flashlight 1
mp_footsteps 1
mp_forcechasecam 0          // dead players free-spectate
mp_fadetoblack 0            // dead players still see the action
mp_autokick 0               // no afk kick
mp_logfile 1
mp_logmessages 1
mp_logdetail 0              // keep core logs, skip verbose damage logs

// --- ReGameDLL_CS extras ---
mp_hostagepenalty 0         // no kick for hostage kills
mp_round_infinite 0
mp_free_armor 2             // 0=none 1=kevlar 2=kevlar+helmet (free every round!)
mp_infinite_ammo 0          // plugin handles BP refill for rifles (reload still needed) + clip refill for pistols/shotguns (no reload)

// --- Voice ---
sv_voiceenable 1
sv_alltalk 1                // EVERYONE hears everyone (alive, dead, cross-team)

// --- Rates (optimized 2026) ---
fps_max 500                 // stable enough for CS 1.6, much cheaper than 1000
sv_maxrate 60000            // max bytes/sec to client
sv_minrate 15000            // min bytes/sec to client
sv_maxupdaterate 66         // lower CPU/network than 100, still smooth
sv_minupdaterate 30         // let weaker clients connect cleanly
sv_maxcmdrate 66            // max commands/sec from client
sv_mincmdrate 30            // min commands/sec from client

// --- Physics ---
sv_gravity 800
sv_airaccelerate 10
sv_stepsize 18
sv_stopspeed 75

// --- Security / network ---
sv_lan 0
sv_cheats 0
sv_timeout 65
sv_allow_upload 0
sv_allow_download 1
sv_downloadurl ""
pausable 0
decalfrequency 60
allow_spectators 1

// --- RCON security (anti brute-force) ---
// rcon_password is written at container start by entrypoint.sh:
//   - if RCON_PASSWORD env var is set, it is used
//   - otherwise a random 24-char password is generated and logged once
// Never commit a real password to this file.
rcon_password "__SET_AT_RUNTIME__"
sv_password ""
sv_rcon_banpenalty 60
sv_rcon_maxfailures 5
sv_rcon_minfailures 5
sv_rcon_minfailuretime 30

// --- Logs ---
log on
logsdir logs

// ==========================================================
// AMX Mod X - default access for ALL players
// ==========================================================
// Flags granted to every connected player (no users.ini entry needed):
//   b = reserved slot   c = kick          e = slay/slap
//   f = map change      i = admin chat    j = votes
//   m/n = custom fun    u = open menus (amx_menu)
//
// Owner (in users.ini) keeps exclusive:
//   d = ban       g/h = cvar/cfg       k = sv_password     l = rcon
//
amx_default_access "bcefijmnu"

// --- Mapchooser (end-of-map automatic voting) ---
amx_extendmap_max 60        // keep each map capped around one hour
amx_extendmap_step 15       // each extend vote adds +15 min
amx_vote_delay 10           // delay between successive votes (minutes)
amx_vote_time 10            // duration of a vote in seconds
amx_vote_answers 1          // show vote results to players

// --- Full Equip plugin ---
fe_money 16000
fe_armor 1
fe_health 125               // slight boost for humans + bots (rifle headshots still kill)
fe_refill_money 1           // top players back to $16000 after purchases

// --- Loadout Packs plugin ---
lp_enabled 1
lp_show_menu 1              // first human spawn shows 1-key pack selection
lp_spawn_delay 0.6          // wait until CS has assigned bomb/default spawn gear

// --- Defibrillator plugin ---
// Walk near a dead teammate, the "[E] Hold to revive" prompt appears,
// hold E to fill the defuse-style progress bar, release any time to cancel.
df_enabled 1
df_count 2                  // defibs per player per round (refilled at Round_Start)
df_range 150.0              // max distance to dead body in units (~1.8m)
df_hold_time 2.5            // seconds to hold E to complete the revive
df_health 100               // HP after revive (<=0 = fall back to fe_health)
df_show_hud 1               // show "Defib: N" + the [E] prompt
df_skip_bots 1              // ignore dead bots in the search

// --- Server Tools plugin ---
st_revive_health 0          // 0 = revived players reuse fe_health

// --- Weapon Limits plugin ---
wl_awp_per_team 3           // max 3 AWP snipers per team (humans only)
wl_block_autosniper 1       // block G3SG1 and SG550 for everyone
wl_block_shield 1           // block tactical shield for everyone
wl_bots_no_scoped 1         // bots can never get AWP, Scout, AUG, SG552

// --- Native CZ bots (ReGameDLL) ---
// NOTE: bot_enable MUST live in game_init.cfg (read once at DLL init, not reloadable).
// Everything below is FCVAR_SERVER and re-applied on map change.
bot_quota 8                 // maintain 8 players total across both teams
bot_quota_mode fill         // fill: bots + humans = bot_quota (auto-kick on human join)
bot_difficulty 2            // 0=easy 1=normal 2=hard 3=expert
bot_join_after_player 0     // 0 = bots connect even with 0 humans (default is 1 = empty server)
bot_join_team any           // any/T/CT — let them auto-balance
bot_chatter minimal         // off/minimal/normal/radio
bot_allow_rogues 0          // no lone-wolf behavior
bot_defer_to_human 1        // bots step aside when humans are nearby
bot_prefix ""               // no "[BOT]" prefix on names

// Bot weapon restrictions — consulted by the CZ BuyState BEFORE any purchase.
// This is the ONLY layer that reliably blocks the items; Ham/fakemeta hooks
// run too late in the bot buy pipeline.
bot_allow_snipers 0         // no AWP, Scout, G3SG1, SG550 for bots
bot_allow_shield 0          // no tactical shield for bots
bot_allow_grenades 1        // HE/flash/smoke stay enabled — part of smart play
bot_allow_pistols 1
bot_allow_shotguns 1
bot_allow_sub_machine_guns 1
bot_allow_rifles 1          // AK/M4/AUG/SG552/Famas/Galil all allowed
bot_allow_machine_guns 1    // M249 OK

// --- Force our settings after EVERY map change ---
// ReGameDLL reloads game.cfg on map change which can reset cvars.
// mapchangecfgfile makes HLDS re-exec this file after every map load.
mapchangecfgfile "server.cfg"

// --- AMX comfort ---
amx_show_activity 2         // show admin actions with name
