// Reunion configuration
// Handles mixed Steam + non-Steam client authentication.

// Salt for generating stable SteamIDs for non-Steam clients.
// IMPORTANT: change this to a unique random string for your server.
// Non-Steam clients get a SteamID based on their CD key hash + this salt.
SteamIdHashSalt = "aiteklabs-cs16-eu-fun-2026"

// Authorization modes:
// 0 = disabled, 1 = HLDS key (default), 2 = new Reunion key
// Steam clients are always authorized via Steam.
AuthVersion = 2

// Allow non-Steam (pirated) clients to connect:
// 0 = block, 1 = allow
EnableNonSteamClients = 1

// Server-side SteamID generation for non-Steam clients
// 0 = random each connect, 1 = stable based on CD key hash + salt
ServerSideIdGeneration = 1
